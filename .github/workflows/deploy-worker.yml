name: Deploy Neon Notes Worker

on:
  push:
    branches:
      - master
    paths:
      - "cloud/neon-notes-worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloud/neon-notes-worker/package-lock.json

      - name: Install dependencies
        working-directory: cloud/neon-notes-worker
        run: npm ci

      - name: Deploy to Cloudflare Workers
        working-directory: cloud/neon-notes-worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
