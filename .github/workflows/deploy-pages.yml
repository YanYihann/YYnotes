name: Deploy to Cloudflare Pages Functions

on:
  push:
    branches:
      - master
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "**/*.mdx"
      - "prompt.md"
      - "next.config.mjs"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"
      - "tailwind.config.ts"
      - "postcss.config.mjs"
      - "tsconfig.json"
      - "functions/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Cloudflare Pages config
        id: cf-pages-config
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ] || [ -z "${CLOUDFLARE_PAGES_PROJECT_NAME}" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare Pages deploy skipped. Please set secrets CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID and variable CLOUDFLARE_PAGES_PROJECT_NAME."
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}

      - name: Disable Next.js API routes for static export
        run: rm -rf app/api

      - name: Build static site
        env:
          DEPLOY_TARGET: ${{ vars.DEPLOY_TARGET || 'cloudflare-pages' }}
          NEXT_PUBLIC_NOTES_API_BASE: ${{ vars.NEXT_PUBLIC_NOTES_API_BASE || 'https://neon-notes-worker.yynotes-api.workers.dev' }}
          NEXT_PUBLIC_NOTES_WRITE_KEY: ${{ vars.NEXT_PUBLIC_NOTES_WRITE_KEY }}
        run: npm run build

      - name: Prepare Wrangler for Pages deploy
        if: steps.cf-pages-config.outputs.missing == 'false'
        run: |
          if [ -f wrangler.toml ]; then
            mv wrangler.toml wrangler.worker.toml
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.cf-pages-config.outputs.missing == 'false'
        run: npx wrangler pages deploy out --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" --branch "$GITHUB_REF_NAME"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
