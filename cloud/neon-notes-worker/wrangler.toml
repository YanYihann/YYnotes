name = "neon-notes-worker"
main = "src/index.js"
compatibility_date = "2026-04-19"

[vars]
OPENAI_MODEL = "gpt-4.1-mini"
ALLOWED_ORIGIN = "https://yynotes.pages.dev,https://yanyihann.github.io,http://localhost:3000,http://127.0.0.1:3000"
